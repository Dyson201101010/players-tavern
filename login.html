<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員系統 | 遊戲吧 Players’ Tavern！</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #5865F2;
            --primary-glow: rgba(88, 101, 242, 0.4);
            --bg: #050505;
            --card-bg: rgba(255, 255, 255, 0.06);
            --border: rgba(255, 255, 255, 0.12);
            --text-secondary: rgba(255, 255, 255, 0.4);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--bg);
            color: white;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden; position: relative;
        }

        #bg-wrap { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; transition: transform 0.2s ease-out; }
        .fluid-bg {
            position: absolute; width: 120%; height: 120%; top: -10%; left: -10%;
            background: radial-gradient(circle at 15% 20%, #1a1c3a 0%, transparent 50%), radial-gradient(circle at 85% 80%, #161b22 0%, transparent 50%);
            filter: blur(80px); animation: pulseBg 15s infinite alternate ease-in-out;
        }
        @keyframes pulseBg { 0% { transform: scale(1); opacity: 0.7; } 100% { transform: scale(1.1); opacity: 1; } }

        .container { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px; z-index: 1; width: 100%; padding: 20px; }

        .auth-card {
            width: 100%; max-width: 480px; background: var(--card-bg);
            backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            padding: 50px 40px; border-radius: 36px; border: 1px solid var(--border);
            border-top: 1px solid rgba(255,255,255,0.25); text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6); transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            display: flex; flex-direction: column; align-items: center;
        }
        
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        .shake { animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both; }

        h2 { margin-top: 0; margin-bottom: 35px; font-weight: 700; font-size: 1.8rem; text-shadow: 0 2px 10px rgba(0,0,0,0.4); text-align: center; width: 100%; }

        .input-group { position: relative; margin: 12px 0; width: 100%; }
        input {
            width: 100%; padding: 18px 50px; background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            border-radius: 20px; color: white; outline: none; transition: 0.3s; font-size: 1rem; text-align: center;
        }
        input::placeholder { text-align: center; color: var(--text-secondary); }
        input:focus { border-color: var(--primary); box-shadow: 0 0 25px var(--primary-glow); background: rgba(255,255,255,0.08); }

        .toggle-password { position: absolute; right: 22px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-secondary); z-index: 2; }

        .forgot-pwd-link {
            font-size: 0.85rem; color: var(--text-secondary); cursor: pointer; margin-top: 8px; transition: 0.3s; text-decoration: none;
        }
        .forgot-pwd-link:hover { color: white; text-decoration: underline; }

        button {
            width: 100%; padding: 18px; margin-top: 25px; border-radius: 20px;
            border: none; background: var(--primary); color: white; font-weight: 700; font-size: 1.05rem;
            cursor: pointer; transition: 0.3s; box-shadow: 0 10px 20px rgba(88, 101, 242, 0.2);
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        button:disabled { opacity: 0.7; cursor: not-allowed; }
        .spinner { display: none; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-top: 3px solid white; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .switch-btn { background: transparent; color: var(--text-secondary); margin-top: 15px; border: none; cursor: pointer; font-size: 0.9rem; transition: 0.3s; }
        .switch-btn:hover { color: var(--primary); }

        .privacy-trigger { font-size: 0.8rem; color: var(--text-secondary); cursor: pointer; text-decoration: underline; transition: 0.4s; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(15px);
            display: none; justify-content: center; align-items: center; z-index: 100; opacity: 0; transition: 0.4s;
        }
        .modal-overlay.show { display: flex; opacity: 1; }
        .modal-content {
            background: #111; border: 1px solid var(--border); border-radius: 32px;
            width: 100%; max-width: 500px; padding: 40px; position: relative;
            transform: translateY(30px); transition: 0.4s; text-align: center;
        }
        .modal-overlay.show .modal-content { transform: translateY(0); }
        .close-modal { position: absolute; top: 25px; right: 25px; cursor: pointer; color: var(--text-secondary); font-size: 1.5rem; transition: 0.3s; }

        @media (max-width: 480px) { .auth-card { padding: 40px 25px; } h2 { font-size: 1.5rem; } }
    </style>
</head>
<body>

    <div id="bg-wrap"><div class="fluid-bg"></div></div>

    <div class="container">
        <div class="auth-card" id="main-card">
            <h2 id="auth-title">登入遊戲吧</h2>
            
            <div class="input-group">
                <input type="email" id="email" placeholder="電子郵件" spellcheck="false" autofocus tabindex="1">
            </div>

            <div class="input-group">
                <input type="password" id="password" placeholder="密碼" tabindex="2">
                <i class="fas fa-eye toggle-password" id="togglePassword"></i>
            </div>

            <div class="forgot-pwd-link" id="openForgot">忘記密碼？</div>

            <button id="main-btn" tabindex="3">
                <span id="btn-text">進入網站</span>
                <div class="spinner" id="btn-spinner"></div>
            </button>

            <button class="switch-btn" id="switch-mode">沒有帳號？立即註冊</button>
            <div id="message" style="margin-top: 15px; font-size: 0.85rem; min-height: 1.2em; text-align: center; width: 100%;"></div>
        </div>

        <div class="privacy-trigger" id="openPrivacy">隱私權政策與安全聲明</div>
    </div>

    <div class="modal-overlay" id="forgotModal">
        <div class="modal-content">
            <i class="fas fa-times close-modal" id="closeForgot"></i>
            <div class="modal-header" style="font-weight:700; font-size:1.3rem; margin-bottom:15px; color:white;">找回密碼</div>
            <p style="color:rgba(255,255,255,0.6); font-size:0.9rem; margin-bottom:25px;">請輸入您的電子郵件，我們將發送重設連結至您的信箱。</p>
            <div class="input-group">
                <input type="email" id="reset-email" placeholder="輸入註冊時的電子郵件">
            </div>
            <button id="reset-pwd-btn" style="margin-top: 15px;">發送驗證郵件</button>
            <p style="color:rgba(255,255,255,0.3); font-size:0.75rem; margin-top:12px; line-height:1.5;">若遲未收到郵件，請檢查您的「垃圾郵件」或「促銷內容」分類。</p>
            <div id="reset-message" style="margin-top: 15px; font-size: 0.85rem;"></div>
        </div>
    </div>

    <div class="modal-overlay" id="privacyModal">
        <div class="modal-content">
            <i class="fas fa-times close-modal" id="closePrivacy"></i>
            <div class="modal-header" style="font-weight:700; font-size:1.3rem; margin-bottom:20px; color:white;">隱私權政策與安全聲明</div>
            <div class="modal-body" style="line-height:1.8; font-size:0.95rem; color:rgba(255,255,255,0.7); text-align: center;">
                歡迎來到「遊戲吧 Players’ Tavern！」。我們承諾：<br><br>
                <strong>一、技術安全保障</strong><br>
                本系統採用加密儲存。您的密碼經由單向雜湊處理，管理員無法觀看您的密碼內容。<br><br>
                <strong>二、隱私保密</strong><br>
                我們絕對不會將您的個人帳號數據分享給任何第三方。您的資料僅用於會員系統驗證。<br><br>
                <strong>三、版權聲明</strong><br>
                本網頁之設計與視覺風格由「遊戲吧 Players’ Tavern！」所有。
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDNXgRe2_CmCFk1n7jvx6HvtRLlheecbDY",
            authDomain: "players-tavern-web.firebaseapp.com",
            projectId: "players-tavern-web",
            storageBucket: "players-tavern-web.firebasestorage.app",
            messagingSenderId: "674171547120",
            appId: "1:674171547120:web:2b0d3cb5c576857b818135",
            measurementId: "G-S34P8KD6SX"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        function toggleModal(id, show) {
            const el = document.getElementById(id);
            if(show) { el.style.display = 'flex'; setTimeout(() => el.classList.add('show'), 10); }
            else { el.classList.remove('show'); setTimeout(() => el.style.display = 'none', 400); }
        }

        document.getElementById('openPrivacy').onclick = () => toggleModal('privacyModal', true);
        document.getElementById('closePrivacy').onclick = () => toggleModal('privacyModal', false);
        document.getElementById('openForgot').onclick = () => toggleModal('forgotModal', true);
        document.getElementById('closeForgot').onclick = () => toggleModal('forgotModal', false);

        const resetBtn = document.getElementById('reset-pwd-btn');
        const resetMsg = document.getElementById('reset-message');
        resetBtn.onclick = async () => {
            const email = document.getElementById('reset-email').value.trim();
            if(!email) { resetMsg.innerText = "請先輸入電子郵件"; return; }
            resetBtn.disabled = true;
            try {
                await sendPasswordResetEmail(auth, email);
                resetMsg.style.color = "#4dff4d";
                resetMsg.innerText = "驗證郵件已發送！";
            } catch (error) {
                resetBtn.disabled = false;
                resetMsg.style.color = "#ff4d4d";
                resetMsg.innerText = "發送失敗，請確認郵件是否正確。";
            }
        };

        const bgWrap = document.getElementById('bg-wrap');
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) / 60;
            const moveY = (e.clientY - window.innerHeight / 2) / 60;
            bgWrap.style.transform = `translate(${moveX}px, ${moveY}px)`;
        });

        const passwordInput = document.getElementById('password');
        document.getElementById('togglePassword').onclick = function() {
            const isPwd = passwordInput.type === 'password';
            passwordInput.type = isPwd ? 'text' : 'password';
            this.className = isPwd ? 'fas fa-eye-slash toggle-password' : 'fas fa-eye toggle-password';
        };

        let isLoginMode = true;
        const mainBtn = document.getElementById('main-btn');
        const btnText = document.getElementById('btn-text');
        const btnSpinner = document.getElementById('btn-spinner');
        const switchBtn = document.getElementById('switch-mode');
        const msg = document.getElementById('message');
        const mainCard = document.getElementById('main-card');

        switchBtn.onclick = () => {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? "登入遊戲吧" : "註冊帳號";
            btnText.innerText = isLoginMode ? "進入網站" : "建立帳號";
            switchBtn.innerText = isLoginMode ? "沒有帳號？立即註冊" : "已有帳號？返回登入";
            document.getElementById('openForgot').style.display = isLoginMode ? 'block' : 'none';
            msg.innerText = "";
        };

        mainBtn.onclick = async () => {
            const email = document.getElementById('email').value.trim();
            const password = passwordInput.value;
            if(!email || !password) return;

            mainBtn.disabled = true;
            btnText.style.display = 'none';
            btnSpinner.style.display = 'block';

            try {
                if (isLoginMode) {
                    await signInWithEmailAndPassword(auth, email, password);
                    msg.style.color = "#4dff4d";
                    msg.innerText = "驗證成功，正在進入網站...";
                    setTimeout(() => window.location.href = "index.html", 1000);
                } else {
                    await createUserWithEmailAndPassword(auth, email, password);
                    alert("帳號建立成功！現在可以登入了。");
                    location.reload();
                }
            } catch (error) {
                mainBtn.disabled = false;
                btnText.style.display = 'block';
                btnSpinner.style.display = 'none';
                mainCard.classList.add('shake');
                setTimeout(() => mainCard.classList.remove('shake'), 400);
                msg.style.color = "#ff4d4d";
                msg.innerText = "驗證失敗，請檢查輸入資訊";
            }
        };
    </script>
</body>
</html>
